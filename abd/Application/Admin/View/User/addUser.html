<include file="Public:header"/>
<!--主页面-->
<div id="main-content" class="content">
    <ul class="breadcrumb">
        <li><a href="/">首页</a></li>
        <li><a href="">案例管理</a></li>
        <li class="active">添加案例</li>
    </ul>
    <div class="page-header clearfix">
        <h3>添加案例</h3>
    </div>

    <div id="tabs-content" class="content-box-content">
        <div  class="form-horizontal">
            <input type="hidden" name="cover_id" value="" />
            <input type="hidden" name="asset_ids" value="" />
            <div class="form-group" style="margin-left:0px !important;">
                <label for="categoryid" class="col-sm-3 col-md-3 col-lg-1"><em class="prompt-red">*</em>所属分类：</label>
                <div class="col-sm-9">
                    <select id="categoryid" name="categoryid" class="form-control" style="width:101.5%;">
                        <volist name=":cate_options(1, 'all')" id="categoryid">
                            <option value="{$categoryid.id}" >{$categoryid.title}</option>
                        </volist>
                    </select>
                </div>
            </div>
        </div>
        <div class="form-group add-case-item">
            <label for="title" class="col-sm-3 col-md-3  col-lg-1 control-label"><em class="prompt-red">*</em>标题：</label>
            <div class="col-sm-9">
                <input type="text" class="form-control" id="title" name="title" placeholder="标题">
            </div>
        </div>
        <div class="form-group add-case-item">
            <label for="content" class="col-sm-3 col-md-3 col-lg-1 control-label"><em class="prompt-red">*</em>内容：</label>
            <div class="col-sm-9">
                <textarea class="form-control" id="content" style="width:100%;height:80px;margin-bottom:20px;" name="content" placeholder="内容"></textarea>
            </div>
        </div>
        <div class="form-group add-case-item">
            <label class="col-sm-3 col-md-3 col-lg-1 control-label" style="padding-left: 32px;">案例图片:</label>
            <div class="col-sm-9">
                <div id="upload_cover" class="btn btn-success upload_edit">
                    <span></span>
                </div> <!-- div里的span必须保留，用来放文字的 -->
                <div id="show_cover" class="cover_images"></div>
            </div>
        </div>
        <div class="form-group add-case-item">
            <label class="col-sm-3 col-md-3 col-lg-1 control-label"></label>
            <div class="col-sm-9">
                <button id="sure" class="btn btn-default btn-primary" style="width:150px;">确认</button>
            </div>
        </div>
        </form>
    </div>
</div>
<script type="text/javascript">
    //全局配置（这样就不必每次初始化时都加上下面的设置）
    $.jUploader.setDefaults({
        cancelable: true, // 可取消上传
        allowedExtensions: ['jpg', 'jpeg', 'png', 'gif'], // 只允许上传图片
        messages: {
            upload: '上传图片',
            cancel: '取消',
            emptyFile: "{ file } 为空，请选择一个文件.",
            invalidExtension: "{file} 后缀名不合法. 只有 {extensions} 是允许的.",
            onLeave: "文件正在上传，如果你现在离开，上传将会被取消。"
        }
    });

    $(function(){

        //初始化把cover_id设为0
        $("input[name='cover_id']").val('');
        $("input[name='asset_ids']").val('');

        $.jUploader({
            button: 'upload_cover', // 这里设置按钮id
            action: '{:U("User/save_cover", array("id"=>"", type=>"Post"))}', // 这里设置上传处理接口
            // 开始上传事件
            onUpload: function (fileName) {},
            //上传完成事件
            onComplete: function (fileName, response) {
                if(response.state)
                {
                    // $('#tip').text(fileName + ' 上传成功。');
                    //记录封面id
                    const prevVal = $("input[name='cover_id']").val();
                    $("input[name='cover_id']").val(`${prevVal ? prevVal+',':prevVal} ${response.savepath}`);
                    var url = response.savepath;
                    $('#show_cover').append(`
                        <div class="cover_img">
                            <img src="/Uploads/${url}" alt="">
                            <p class="cover_close">×</p>
                        </div>
                    `);
                }else{
                    $('#tip').text(response.info);
                    $('#show_cover').html('');
                }
            },
            // 取消上传事件
            onCancel: function (fileName) {
                $('#tip').text(fileName + ' 上传取消。');
            },
            // 系统信息显示（例如后缀名不合法）
            showMessage: function (message) {
                $('#tip').text(message);
            }
        });
    });
    $(".cover_images").on('click','p.cover_close',function() {
        const nowIndex = $(this).parent('.cover_img').index()
        let nowVal = $("input[name='cover_id']").val().split(',')
        nowVal.splice(nowIndex, 1)
        let result = ''
        $(this).parent('.cover_img').remove()
        nowVal.forEach((item,index) => {
            result += index == nowVal.length -1 ? item: item+','
        });
        $("input[name='cover_id']").val(result)
    })
    $('#sure').click(function(){
        var categoryid = $.trim($('#categoryid').val());
        var title = $.trim($('#title').val());
        var content = $.trim($('#content').val());
        const coverList = $("input[name='cover_id']").val();
        if(title == ''){
            alert('标题');
            return false;
        }
        if(content == ''){
            alert('内容');
            return false;
        }
        $.ajax({
            url:"{:U('User/addUser')}",
            type:'POST',
            dataType: "json",//如果含有这句话，ajax返回的必须是json自动转码
            data:{title:title,content:content,categoryid:categoryid, cover_id: coverList},
            success:function(data){
                if(data['code'] == 1){
                    alert('添加成功');
                    window.location.href = "{:U('User/zList')}";
                }
                if(data['code'] == 2){
                    alert('添加失败');
                }
            }
        });
    });
</script>

<include file="Public:footer"/>
