<script>
function submitForm(){
	var v1 = $.trim($('#zv1').val());
	var v2 = $.trim($('#zv2').val());
	var v3 = $.trim($('#zv3').val());
	var v4 = $.trim($('#zv4').val());
	var v5 = $.trim($('#zv5').val());
	var v6 = $.trim($('#zv6').val());
	var v7 = $.trim($('#zv7').val());
	var v8 = $.trim($('#zv8').val());
	var v11 = 2;
	if(v1 == ''){
		alert('请输入矿场地点');
		return false;
	}
	if(v2 == ''){
		alert('请输入矿场规模');
		return false;
	}
	if(v3 == ''){
		alert('请输入矿场矿工号');
		return false;
	}
	if(v4 == ''){
		alert('请输入自有矿机总日产');
		return false;
	}
	if(v5 == ''){
		alert('请输入预计发售债券规模');
		return false;
	}
	if(v6 == ''){
		alert('请输入自有矿场规模');
		return false;
	}
	if(v7 == ''){
		alert('请输入托管规模');
		return false;
	}
	if(v8 == ''){
		alert('请输入联系邮箱地址');
		return false;
	}else{
		var emreg=/^\w{3,}(\.\w+)*@[A-z0-9]+(\.[A-z]{2,5}){1,2}$/;
		 if(emreg.test(v8)==false){
			alert('联系方式请输入有效的邮箱地址');
			return false;
		 }
	}
	$.ajax({
		url:"{:U('User/applyJoinUs')}",
		type:'POST',
		dataType: "json",//如果含有这句话，ajax返回的必须是json自动转码
		data:{v1:v1,v2:v2,v3:v3,v4:v4,v5:v5,v6:v6,v7:v7,v8:v8,v11:v11},
		success:function(data){
			if(data['code'] == 1){
				alert('申请成功!请留意我们的官方邮件,官方邮箱:1069385609@qq.com');
				window.parent.location.reload();
			} else {
				alert('申请失败');
			}
		}
	});
}
//点赞
function myFunction(obj,id){
	//id判断是否点击过
	$.ajax({
		url:"{:U('User/dianzan')}",
		type:'POST',
		dataType: "json",//如果含有这句话，ajax返回的必须是json自动转码
		data:{id:id},
		success:function(data){
			if(data['code'] == 1){
				$(obj).children('span').text(parseInt($(obj).children('span').text())+1);
				alert('点赞成功,谢谢!');
			}
		}
	});
}
</script>
