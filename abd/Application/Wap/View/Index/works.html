<script>
    function setCookie(name,value){
        var Days = 30;
        var exp = new Date();
        exp.setTime(exp.getTime() + Days*24*60*60*1000);
        document.cookie = name + "="+ escape (value) + ";expires=" + exp.toGMTString();
    }
    $('.menu').click(function () {
        $('.mask').removeClass('slideOutUp').addClass('slideInDown').show()
        $('.mask').on('touchmove', function (event) {
            event.preventDefault();
        });
    })
    $('.closed').click(function () {
        $('.mask').addClass('slideOutUp').removeClass('slideInDown')
        $('.mask').off('touchmove', function (event) {
            event.preventDefault();
        });
    })

    $('.language').on('click','span',function() {
        $(this).addClass('active').removeClass()
        setCookie('language',$(this).attr('lagua'))
        location.reload()
    })


</script>

    // work case
    function getWorkCase(caseid,menuIndex) {
        // $('.work_popup').eq(menuIndex).show()
        $('#workTodo').eq(menuIndex).on('touchmove', function (event) {
            event.preventDefault();
        });
        $(".type_btn").html('')
        $(".work_list").html('')
        const _this = this
        $.ajax({
            type:'GET',
            url:'/index.php/Work/info',
            data: { id: caseid },
            response: JSON,
            success:function(res){
                const returnRes =eval(JSON.parse(res))
                if(returnRes.code == 200) {
                    const { data } =  returnRes
                    arrList = data.list;
                    data.arr.forEach((menuItem,index) => {
                        $(".type_btn").append(`<span class="${ index == menuIndex ? 'type_active':''}" curid="${menuItem.menu.id}">${menuItem.menu.title}</span>`)
                    })
                    if(data.list && data.list.length) {
                        data.list.forEach((listItem,index) => {
                            $("#workTodo").append(`<li case="${listItem.id}">
                                <img class="wow fadeIn mescroll-lazy-in" src="/Uploads/${listItem.img_arr ? (listItem.img_arr.split(','))[0].replace(/^\s*/,""): ''  }" >
                                <p class="wow fadeInLeft" style="visibility: visible;">${listItem.title}</p>
                            </li>`)
                        })
                    }

                }
            }

        })
    }
    // work case

            $("#worksImg").append(`<img src="/Uploads/${urlItem}" class="works-img" title="${data.title}" alt="${data.title}">`)

    }

    /*上下拉刷新*/
    function reFreshPull(upFunc) {
        dataArr = {
            data:[]
        }
        //创建MeScroll对象
        mescroll = new MeScroll("mescroll", {
            down:{
                use:false
            },
            up: {
                auto:true,//初始化完毕,是否自动触发上拉加载的回调
                isBoth: false, //上拉加载时,如果滑动到列表顶部是否可以同时触发下拉刷新;默认false,两者不可同时触发; 这里为了演示改为true,不必等列表加载完毕才可下拉;
                callback: upCallback, //上拉加载的回调
                isBounce: false, //此处禁止ios回弹
                page:{
                    num : 0 ,
                    size : 5
                },
                offset:50,
                htmlNodata:'<p class="upwarp-nodata" style="font-size: 0.469rem;-webkit-text-fill-color: #000;">没有更多数据</p>',
                loadFull:{
                    use : true ,
                    delay : 200
                },
                htmlLoading:'',
                lazyLoad: {
                    use: true // 是否开启懒加载,默认false
                }

            }
        });
        /*下拉刷新的回调 */
        function upCallback(page){
            if(mescroll.optUp.page.num == 1){
                mescroll.hideUpScroll();
            }else{
                mescroll.showUpScroll();
            }
            upFunc(mescroll)
        }
    }

    //scroll

    function popupScroll(id) {
        var scroll = 'mescroll'+id
        scroll = new MeScroll("mescroll"+id, {
            down:{
                use:false,
            },
            up: {
                lazyLoad: {
                    use: true // 是否开启懒加载,默认false
                }

            }
        });
        scroll.lazyLoad()
    }

    $('#workTodo').on('click','li',function () {
