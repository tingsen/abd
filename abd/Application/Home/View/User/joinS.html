<script>
function submitForm(){
	var v1 = $.trim($('#sv1').val());
	var v2 = $.trim($('#sv2').val());
	var v3 = $.trim($('#sv3').val());
	var v4 = $.trim($('#sv4').val());
	var v8 = $.trim($('#sv8').val());
	var v11 = 1;
	if(v1 == ''){
		alert('姓名');
		return false;
	}
	if(v2 == ''){
		alert('公司名称');
		return false;
	}
	if(v3 == ''){
		alert('手机');
		return false;
	}
	if(v4 == ''){
		alert('留言');
		return false;
	}
	if(v8 == ''){
		alert('请输入联系邮箱地址');
		return false;
	}else{
		var emreg=/^\w{3,}(\.\w+)*@[A-z0-9]+(\.[A-z]{2,5}){1,2}$/;
		 if(emreg.test(v8)==false){
			alert('联系方式请输入有效的邮箱地址');
			return false;
		 }
	}
	$.ajax({
		url:"{:U('User/applyJoinUs')}",
		type:'POST',
		dataType: "json",//如果含有这句话，ajax返回的必须是json自动转码
		data:{v1:v1,v2:v2,v3:v3,v4:v4,v5:'',v6:'',v7:'',v8:v8,v11:v11},
		success:function(data){
			if(data['code'] == 1){
				alert('申请成功!请留意我们的电话');
				window.parent.location.reload();
			} else {
				alert('申请失败');
			}
		}
	});
}
