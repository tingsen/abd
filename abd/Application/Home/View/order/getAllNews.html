.mycontent{ 
	max-width: 1200px; 
	width: 96%;
	margin:0 auto;
 }
.mytitl{
	font-weight: 400;
    font-size: 40px;
    color: #fff;
    margin: 20px 0 30px;
    text-align: center;
}
.mart20{ margin-top: 20px; }
.page { text-align: center; }
.page li{ cursor: pointer; display: inline-block;margin:0 5px; border:1px solid #f0f0f0; border-radius: 5px; padding:2px 8px; font-size: 12px; color: #f0f0f0; }
.page li.active,.page li:hover{ border:1px solid #2fb7ca;background: #2fb7ca; color: #ffffff; }  
</style>
<section>
<div class="" style="margin-top: 100px;">
	<section class="blog-area section " >
	<div class="row mycontent">
			<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12">
				<h2 class="wow  fadeIn animated mytitl" data-wow-duration="1.0s" style="visibility: visible; animation-duration: 1.0s; animation-name: fadeIn;">新闻动态</h2>
			</div>
			<volist name="order_list" id="order">
				<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12 mart20">
					<div class="blog wow  fadeIn animated" data-wow-duration="1.3s" style="visibility: visible; animation-duration: 1.3s; animation-name: fadeIn;">
						<div class="content">
							<span><i class="fa  fa-calendar-o"></i>{$order['ctime']|date='Y年m月d日',###}</span>
								<if condition="$order['is_url'] eq 1">
									<h4><a target="_blank" href="{$order['web_url']}">{$order['title']}</a></h4>
									<a target="_blank" href="{$order['web_url']}" class="blog-btn">read more <i class="fa  fa-arrow-circle-o-right"></i></a>
								<else/>
									<h4><a href="{:U('Order/getNewsInfo',array('id'=>$order['id']))}">{$order['title']}</a></h4>
									<a href="{:U('Order/getNewsInfo',array('id'=>$order['id']))}" class="blog-btn">read more <i class="fa  fa-arrow-circle-o-right"></i></a>
								</if>
						</div>
					</div>
				</div>
			</volist> 
			<div class="col-lg-12 col-md-12 col-sm-12 col-xs-12 mart20">
				<div class="page">
					{$page}
				</div>
			</div>
	</div>
</section>
