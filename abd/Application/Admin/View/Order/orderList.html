<include file="Public:header"/>
<script type="text/javascript" src="__WEBPUBLIC__/Admin/js/ajax-operate.js"></script>
<!--主页面-->
<div id="main-content" class="content">
    <ul class="breadcrumb">
        <li><a href="/">首页</a></li>
        <li class="active"><a href="">资讯管理</a></li>
        <li class="active">资讯列表</li>
    </ul>

    <div class="page-header page-header1 clearfix">
        <h3>资讯列表</h3>
    </div>
    
    <div class="content-box-table content-box-content">
        <form action="{:U('Member/deleteMember')}" method="post" class="batch-form">
            <table class="table table-striped table-framed table-hover">
                <thead>
                    <tr>
                        <th width="6%">
                            编号
                        </th>
                        <th width="10%">标题</th>
                        <th width="10%">资讯内容</th>
                        <th width="10%">是否网址</th>
                        <th width="10%">网址地址</th>
                        <th width="10%">发布时间</th>
                        <th width="6%">操作</th>
                    </tr>
                </thead>
                <tbody class="tbody">
                    <if condition="empty($order_list)">
                        <tr><td colspan="20"><span style="font-size:14px;">暂无数据</span></td></tr>
                    </if>
                    <volist name="order_list" id="order">
                        <tr>
                            <td>{$order['id']}</td>
                            <td>{$order['title']}</td>
                            <td><p style=" overflow: hidden; text-overflow:ellipsis;white-space: nowrap;width:180px;  ">
                                {$order['content']}
                            </p></td>
                            <td>
								<if condition="$order['is_url'] eq 1">
									外部网址
								<else/>
									内部资讯
								</if>
							</td>
                            <td>{$order['web_url']}</td>
							<td>{$order['ctime']|date='Y-m-d H:i:s',###}</td>
                            <td>
								<a href="{:U('Order/editOrder',array('id'=>$order['id']))}" title="修改" class="modify">修改
								</a>&nbsp;
                                <a href="#" title="删除" class="delete-delete">删除
                                </a><input type="hidden" value="{:U('Order/deleteOrder',array('id'=>$order['id']))}">
                               
                            </td>
                        </tr>
                    </volist>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="20">
                            <div class="fr">
                                {$page}
                            </div>
                        </td>
                    </tr>
                </tfoot>
            </table>
        </form>
    </div>
</div>

<script type="text/javascript" src="__WEBPUBLIC__/Common/bootstrap-datetimepicker-master/js/bootstrap-datetimepicker.min.js"></script>
<script type="text/javascript" src="__WEBPUBLIC__/Common/bootstrap-datetimepicker-master/js/locales/bootstrap-datetimepicker.zh-CN.js" charset="UTF-8"></script>

<script type="text/javascript">
    $(document).ready(function(){
        //排序修改
        $("select[name='z_id']").change(function(){
            $('.search-form').submit();
        });
        //批量修改积分
        $('.edit-score-batch').click(function(){
            $('.batch-form').attr('action','{:U("Member/editScoreBatch")}');
            $('.batch-form').submit();
        });
    });
    function face_hide(){
        document.getElementById('excel').style.display = 'none';
    }
    $('.form_datetime').datetimepicker({
        format: 'yyyy-mm-dd',
        language:"zh-CN",
        minView:2,
        autoclose:true
    });
</script>
<include file="Public:footer"/>
