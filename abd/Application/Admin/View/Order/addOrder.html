<include file="Public:header"/>
<!--主页面-->
<div id="main-content" class="content">
    <div class="content-box">

        <ul class="breadcrumb">
            <li><a href="/">首页</a></li>
            <li><a href="{:U('Order/orderList')}">资讯管理</a></li>
            <li class="active">添加资讯</li>
        </ul>

        <!--表格内容-->
        <div class="content-box-content">
            <div class="form-horizontal">
                <!--表单 start-->
                <div class="form-group">
                    <label for="title" class="col-sm-3 control-label"><em class="prompt-red">*</em>资讯标题：</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" id="title" name="title" placeholder="请输入资讯标题">
                    </div>
                </div>
                <div class="form-group">
                    <label for="content" class="col-sm-3 control-label"><em class="prompt-red">*</em>资讯内容：</label>
                    <div class="col-sm-9">
                        <textarea rows="15" id="content" name="content"> </textarea>
                    </div>
                </div>
                <div class="form-group">
                    <label for="is_url" class="col-sm-3 control-label"><em class="prompt-red">*</em>是否网址：</label>
                    <div class="col-sm-9">
                        <select id="is_url" name="is_url">
                            <option value="0" selected>否</option>
                            <option value="1">是</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="web_url" class="col-sm-3 control-label"><em class="prompt-red"></em>网址地址：</label>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" id="web_url" name="web_url" placeholder="请输入网址地址">
                    </div>
                </div>
                <div class="form-group">
                    <div class="col-sm-offset-3 col-sm-9">
                        <button id="sure" class="btn btn-default btn-primary">保存</button>
                    </div>
                </div>
            </div>
            <!--表单 end-->
        </div>
    </div>
</div>

<script type="text/javascript">

    var ue = UE.getEditor('content', {
        initialFrameWidth: 900,    //设置宽度
        initialFrameHeight: 450,   //设置高度
    });
    $('#sure').click(function () {
        var is_url = $("#is_url").find("option:selected").val();
        if (is_url == '') {
            alert('请选择资讯类型');
            return false;
        }
        var title = $.trim($('#title').val());
        if (title == '') {
            alert('请填资讯标题');
            return false;
        }
        var content = ue.getContent('content');
        if (content == '') {
            alert('请填写资讯内容');
            return false;
        }
        var is_url = $.trim($('#is_url').val());

        var web_url = $.trim($('#web_url').val());
        if (is_url == 1 && web_url == '') {
            alert('是网址请填写网址再提交');
            return false;
        }
        $.ajax({
            url: "{:U('Order/addOrder')}",
            type: 'POST',
            dataType: "json",
            data: {is_url: is_url, title: title, content: content, web_url: web_url},
            success: function (data) {
                if (data['code'] == 1) {
                    alert('添加成功');
                    window.location.href = "{:U('Order/orderList')}";
                }
                if (data['code'] == 2) {
                    alert('添加失败');
                }
            }
        });

    });
</script>

<include file="Public:footer"/>
